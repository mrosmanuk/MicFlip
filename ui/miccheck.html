<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mic Check</title>
  <style>
    :root {
      --bg: #1c1c1e; --panel: #2a2a2d; --text: #f2f2f7; --muted: #8e8e93;
      --accent: #f5413a; --green: #34c759; --border: #3a3a3d;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
      -webkit-user-select: none; user-select: none;
    }
    body { padding: 18px; }
    .head { display: flex; align-items: center; gap: 10px; margin-bottom: 16px }
    .dot { width: 12px; height: 12px; border-radius: 50%; background: var(--green) }
    .dot.muted { background: var(--muted) }
    .device { font-weight: 600; font-size: 14px }
    .meter { height: 22px; border-radius: 6px; background: rgba(255,255,255,0.08); overflow: hidden }
    .fill {
      height: 100%; width: 0%;
      background: linear-gradient(to right, var(--green), #ffd60a, var(--accent));
      transition: width 0.05s linear;
    }
    .hint { color: var(--muted); font-size: 12px; margin: 12px 0 16px; line-height: 1.4 }
    button {
      background: #3a3a3d; color: var(--text); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 16px; font-size: 13px; cursor: pointer;
    }
    button:hover { background: #46464a }
    .warn { color: #ffb340; font-size: 12px }
  </style>
</head>
<body>
  <div class="head">
    <div class="dot" id="dot"></div>
    <div class="device" id="device">-</div>
  </div>

  <div class="meter"><div class="fill" id="fill"></div></div>
  <p class="hint" id="hint">Speak normally and the meter should react. When muted it stays flat</p>

  <button id="toggle">Mute</button>

  <script>
    const { invoke } = window.__TAURI__.core;
    const { listen } = window.__TAURI__.event;
    const $ = (id) => document.getElementById(id);

    function applyState(muted, device) {
      $("dot").classList.toggle("muted", muted);
      $("toggle").textContent = muted ? "Unmute" : "Mute";
      if (device) $("device").textContent = device;
      $("hint").textContent = muted
        ? "Muted - speak and the meter should stay flat"
        : "Speak normally and the meter should react";
    }

    listen("mic:level", (e) => { $("fill").style.width = Math.round(e.payload * 100) + "%" });
    listen("mic:state", (e) => applyState(e.payload));
    listen("mic:level-error", (e) => {
      $("hint").innerHTML = '<span class="warn">Microphone access denied or unavailable. Enable it in your OS privacy settings (' + e.payload + ')</span>';
    });

    $("toggle").addEventListener("click", () => invoke("toggle"));

    (async () => {
      const s = await invoke("get_state");
      applyState(s.muted, s.device_name);
      await invoke("start_mic_check");
    })();

    window.addEventListener("beforeunload", () => { invoke("stop_mic_check") });
  </script>
</body>
</html>
