<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: transparent;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
    }
    #hud {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: rgba(30, 30, 32, 0.22);
      backdrop-filter: blur(34px) saturate(150%);
      -webkit-backdrop-filter: blur(34px) saturate(150%);
      border-radius: 26px;
      box-sizing: border-box;
    }
    #badge {
      font-weight: 800;
      letter-spacing: 1px;
      color: #fff;
      background: #f5413a;
      padding: 10px 18px;
      border-radius: 12px;
      font-size: 34px;
    }
    /* live = red (default), muted = gray, info = blue (device switch) */
    #badge.muted { background: #6b6b70; color: #d8d8da; }
    #badge.info { background: #0a84ff; color: #fff; }
    #label {
      color: #f2f2f7;
      font-size: 16px;
      font-weight: 600;
      text-align: center;
      padding: 0 14px;
      max-width: 100%;
      box-sizing: border-box;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="badge">LIVE</div>
    <div id="label">Microphone live</div>
  </div>
  <script>
    const { listen } = window.__TAURI__.event;
    listen("hud:show", (e) => {
      const { badge, label, tone } = e.payload;
      const badgeEl = document.getElementById("badge");
      badgeEl.textContent = badge;
      badgeEl.classList.toggle("muted", tone === "muted");
      badgeEl.classList.toggle("info", tone === "info");
      document.getElementById("label").textContent = label;
    });
  </script>
</body>
</html>
