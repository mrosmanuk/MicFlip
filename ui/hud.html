<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: transparent;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
    }
    #hud {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: rgba(30, 30, 32, 0.22);
      backdrop-filter: blur(34px) saturate(150%);
      -webkit-backdrop-filter: blur(34px) saturate(150%);
      border-radius: 26px;
      box-sizing: border-box;
    }
    #badge {
      font-weight: 800;
      letter-spacing: 1px;
      color: #fff;
      background: #f5413a;
      padding: 10px 18px;
      border-radius: 12px;
      font-size: 34px;
    }
    #badge.muted { background: #6b6b70; color: #d8d8da; }
    #label { color: #f2f2f7; font-size: 16px; font-weight: 600; }
  </style>
</head>
<body>
  <div id="hud">
    <div id="badge">LIVE</div>
    <div id="label">Microphone live</div>
  </div>
  <script>
    const { listen } = window.__TAURI__.event;
    listen("hud:show", (e) => {
      const muted = e.payload;
      document.getElementById("badge").classList.toggle("muted", muted);
      document.getElementById("label").textContent = muted ? "Microphone muted" : "Microphone live";
    });
  </script>
</body>
</html>
